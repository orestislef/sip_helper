name: sip_helper
description: >-
  A lightweight SIP/VoIP library for Flutter. SIP protocol (UDP),
  RTP audio transport, G.711 A-law codec, and Windows audio via WinMM FFI.
version: 0.2.1
homepage: https://orestislef.gr/
repository: https://github.com/orestislef/sip_helper
issue_tracker: https://github.com/orestislef/sip_helper/issues
topics:
  - sip
  - voip
  - rtp
  - audio
  - telephony

platforms:
  windows:

environment:
  sdk: ^3.0.0

dependencies:
  ffi: ^2.2.0
  crypto: ^3.0.7

dev_dependencies:
  lints: ^6.1.0
  test: ^1.30.0
